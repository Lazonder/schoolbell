# Configuration for the pybabel command-line tool.
#
# pybabel walks the project to find translatable strings (anything
# wrapped in gettext / _() / {% trans %}) and writes them to a
# template file (messages.pot). This config tells it where to look
# and which extensions to enable for Jinja2 templates.
#
# Common workflow:
#   pybabel extract -F babel.cfg -o messages.pot .
#   pybabel update  -i messages.pot -d translations -l en
#   # ... edit translations/en/LC_MESSAGES/messages.po ...
#   pybabel compile -d translations
#
# The compile step turns each .po file into a binary .mo that
# Flask-Babel loads at request time.

[python: **.py]
[jinja2: **/templates/**.html]
extensions=jinja2.ext.autoescape,jinja2.ext.with_
