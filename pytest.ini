[pytest]
# pythonpath = .  makes `from webinterface import ...` work without having
# to install webinterface as a package. Pytest then adds the project root
# to sys.path when running the tests.
pythonpath = .

# Tests live in /tests. Without this line pytest searches the whole
# project and might accidentally interpret helpers/scripts as tests.
testpaths = tests

# Only files starting with test_, and functions starting with test_.
# These are pytest defaults, set explicitly here for clarity.
python_files = test_*.py
python_functions = test_*
