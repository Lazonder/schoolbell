[pytest]
# pythonpath = .  zorgt dat `from webinterface import ...` werkt zonder
# dat we webinterface als package hoeven te installeren. Pytest voegt de
# project-root dan aan sys.path toe bij het draaien van de tests.
pythonpath = .

# Tests leven in /tests. Zonder deze regel zoekt pytest door het hele
# project en kan hij per ongeluk helpers/scripts als tests interpreteren.
testpaths = tests

# Alleen bestanden die met test_ beginnen, en functies die met test_
# beginnen. Dit zijn pytest-defaults, hier expliciet gezet voor de
# duidelijkheid.
python_files = test_*.py
python_functions = test_*
